<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrainSim — millones de granos GPU (WebGPU)</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0d10; }
      canvas { display: block; width: 100vw; height: 100vh; }
      #hud { position: fixed; top: 12px; left: 12px; font-family: system-ui, sans-serif;
        color: #dfe6ee; font-size: 13px; line-height: 1.5; background: rgba(12,16,22,.6);
        padding: 10px 13px; border-radius: 10px; }
      #hud b { color: #9fd0ff; }
      #err { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
        font-family: system-ui; color: #ff9; text-align: center; padding: 40px; font-size: 16px; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="hud"></div>
    <div id="err"></div>
    <script type="module" src="/src/gpuDemo.ts"></script>
  </body>
</html>
